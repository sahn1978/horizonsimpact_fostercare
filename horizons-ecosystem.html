  const spineLine=f.spine?`<p class="note">Backbone: methods and big data reaching every topic.</p>`:"";
  detail.innerHTML=`<p class="kick" style="color:${CLUSTERS[f.cl].color}">Cluster ${f.cl} · ${CLUSTERS[f.cl].name}</p><h2>${f.name}</h2><p class="role">${f.role}</p>${spineLine}
    <p class="kick" style="margin-top:8px">Topics you feed</p><div class="chips">${f.d.map(tChip).join("")}</div>
    <p class="kick" style="margin-top:12px">Interdisciplinary ties (${cross.length})</p><div class="chips">${crossChips}</div>
    <p class="kick" style="margin-top:12px">Within your discipline (${same.length})</p><div class="chips">${sameChips}</div>
    <button class="btn-reset" id="reset2">Reset view</button>`;wire();}
function selectFacultyEco(fid){clearHi();const f=FAC[fid],mine=f.spine?new Set(Object.keys(TOPICS)):new Set(f.d),neigh=new Set(tieOf[fid].map(t=>t.o));
  document.querySelectorAll(".fnode").forEach(n=>{const id=n.dataset.f;if(id===fid)n.classList.add("sel");else if(!neigh.has(id))n.classList.add("mute");});
  document.querySelectorAll("#ecoTopics .dnode").forEach(n=>{if(mine.has(n.dataset.d))n.classList.add("sel");else n.classList.add("mute");});
  document.querySelectorAll(".ecoedge").forEach(e=>{if(e.dataset.f===fid)e.classList.add("hot");else e.classList.add("mute");});
  document.querySelectorAll(".clabel").forEach(l=>{if(l.dataset.cid!==f.cl)l.classList.add("mute");});
  const collabs=[...neigh].sort((a,b)=>FAC[a].name.localeCompare(FAC[b].name)).map(f=>fChip(f)).join("");
  const spineLine=f.spine?`<p class="note">Backbone: reaches every topic. Emphasis below.</p>`:"";
  detail.innerHTML=`<p class="kick" style="color:${CLUSTERS[f.cl].color}">Cluster ${f.cl} · ${CLUSTERS[f.cl].name}</p><h2>${f.name}</h2><p class="role">${f.role}</p>${spineLine}
    <p class="kick" style="margin-top:8px">${f.spine?"Primary topics":"Topics you feed"}</p><div class="chips">${f.d.map(tChip).join("")}</div>
    <p class="kick" style="margin-top:12px">Scholars you share a topic with (${neigh.size})</p><div class="chips">${collabs}</div>
    <button class="btn-reset" id="reset2">Reset view</button>`;wire();}

// lens (scholars or eco)
function selectLens(id){clearHi();const l=LENSES[id],fs=new Set(l.faculty),ds=new Set(l.domains);
  document.querySelector(`.lens[data-lens="${id}"]`)?.classList.add("active");
  document.querySelectorAll(".fnode").forEach(n=>{if(fs.has(n.dataset.f))n.classList.add("sel");else n.classList.add("mute");});
  if(tab==="eco"){
    document.querySelectorAll("#ecoTopics .dnode").forEach(n=>{if(ds.has(n.dataset.d))n.classList.add("sel");else n.classList.add("mute");});
    document.querySelectorAll(".ecoedge").forEach(e=>{if(fs.has(e.dataset.f)&&ds.has(e.dataset.d))e.classList.add("hot");else e.classList.add("mute");});
    document.querySelectorAll(".clabel").forEach(x=>{if(!new Set(l.faculty.map(f=>FAC[f].cl)).has(x.dataset.cid))x.classList.add("mute");});
  } else {
    document.querySelectorAll("#nodes .dnode").forEach(n=>{if(ds.has(n.dataset.d))n.classList.add("sel");else n.classList.add("mute");});
    document.querySelectorAll(".fedge").forEach(e=>{if(fs.has(e.dataset.f)&&ds.has(e.dataset.d))e.classList.add("show");});
    document.querySelectorAll(".stie").forEach(e=>{const inc=fs.has(e.dataset.a)&&fs.has(e.dataset.b);e.classList.toggle("hot",inc);e.classList.toggle("dim",!inc);e.classList.remove("base");});
    document.querySelectorAll(".arealbl").forEach(n=>n.classList.add("mute"));
  }
  detail.innerHTML=`<p class="kick">Lens</p><h2>${l.name}</h2>
    <p class="kick" style="margin-top:6px">Topics</p><div class="chips">${l.domains.map(tChip).join("")}</div>
    <p class="kick" style="margin-top:12px">Who it gathers (${l.faculty.length})</p><div class="chips">${l.faculty.map(f=>fChip(f)).join("")}</div>
    <button class="btn-reset" id="reset2">Reset view</button>`;wire();}

// Tab 4 network
function applyNetMode(){document.querySelectorAll(".net").forEach(e=>{const t=e.dataset.type;e.classList.toggle("hide",tab!=="network"||(edgeMode==="co"&&t==="aff")||(edgeMode==="aff"&&t==="co"));});}
function nToggles(){return `<div class="toggle"><button class="tg ${edgeMode==='both'?'on':''}" data-m="both">Both</button><button class="tg ${edgeMode==='co'?'on':''}" data-m="co">Co-authorship</button><button class="tg ${edgeMode==='aff'?'on':''}" data-m="aff">Topic affinity</button></div>`;}
function resetNetwork(){clearHi();applyNetMode();
  detail.innerHTML=`<p class="kick">Scholarly network</p><h2>Two kinds of tie</h2>
    <p class="role"><span style="color:var(--co)">Gold</span> lines are confirmed co-authorship, the real bridges. Dashed lines are shared research keywords. Dot size is Google Scholar citations; a dashed outline means no public total was found. Totals are approximate, mid 2026.</p>
    ${nToggles()}<button class="btn-reset" id="reset2">Reset view</button>`;wire();}
function selectFacultyNet(fid){clearHi();applyNetMode();const f=FAC[fid],neigh=sadj[fid];
  document.querySelectorAll(".fnode").forEach(n=>{const id=n.dataset.f;if(id===fid)n.classList.add("sel");else if(!neigh.has(id))n.classList.add("mute");});
  document.querySelectorAll(".net").forEach(e=>{const inc=e.dataset.a===fid||e.dataset.b===fid;e.classList.toggle("hot",inc);e.classList.toggle("dim",!inc);});
  document.querySelectorAll(".clabel").forEach(l=>{if(l.dataset.cid!==f.cl)l.classList.add("mute");});
  const co=COAUTH.filter(e=>e.a===fid||e.b===fid).map(e=>e.a===fid?e.b:e.a);
  const coC=co.map(f=>fChip(f)).join("")||`<span class="chip">none recorded in the group</span>`;
  const affN=[...neigh].filter(n=>!co.includes(n)).sort((a,b)=>FAC[a].name.localeCompare(FAC[b].name)).map(f=>fChip(f)).join("");
  const intC=f.interests.map(i=>`<span class="chip">${i}</span>`).join("");
  const cite=f.cites==null?"Google Scholar total not located":`~${f.cites.toLocaleString()} citations (Google Scholar, approx.)`;
  const link=f.url?` · <a class="scholar" href="https://scholar.google.com/citations?user=${f.url}" target="_blank" rel="noopener">Scholar profile</a>`:"";
  detail.innerHTML=`<p class="kick" style="color:${CLUSTERS[f.cl].color}">Cluster ${f.cl} · ${CLUSTERS[f.cl].name}</p><h2>${f.name}</h2><p class="cites">${cite}${link}</p>
    <p class="kick">Research keywords</p><div class="chips">${intC}</div>
    <p class="kick" style="margin-top:12px">Co-authors in the group</p><div class="chips">${coC}</div>
    <p class="kick" style="margin-top:12px">Keyword neighbors</p><div class="chips">${affN}</div>
    <p class="note" style="margin-top:10px">Frequent external co-authors: ${f.coauthors.length?f.coauthors.join(", "):"not listed"}.</p>
    ${nToggles()}<button class="btn-reset" id="reset2">Reset view</button>`;wire();}

// side
function buildSide(){const box=el("sideExtra");
  if(tab==="topics"){box.innerHTML=`<div class="card"><p class="kick">Topics by outcome area</p><div class="areas" id="areas"></div></div>`;
    const ab=el("areas");Object.entries(AREAS).forEach(([aid,a])=>{const d=document.createElement("div");d.className="area";d.innerHTML=`<h3 style="color:${a.color}">${a.label}</h3><p>${a.blurb}</p>`;
      a.topics.forEach(tid=>{const tp=TOPICS[tid];const b=document.createElement("button");b.className="tp";b.dataset.d=tid;b.innerHTML=`<span class="tdot" style="background:${a.color}"></span><span class="tn">${tp.l1} ${tp.l2}</span><span class="cnt">${cover[tid]}</span>`;b.addEventListener("click",e=>{e.stopPropagation();selectTopic(tid);});d.appendChild(b);});ab.appendChild(d);});
  } else if(tab==="eco"||tab==="scholars"){
    const tip = tab==="eco" ? "A dashed ring marks the methodology and big data backbone, available to every topic." : "Teal lines are interdisciplinary ties: two scholars who study a shared topic across different disciplines.";
    box.innerHTML=`<div class="card"><p class="kick">Enter through a lens</p><div class="lens-row" id="lenses"></div></div>
      <div class="card"><p class="kick">Discipline clusters</p><div class="legend" id="legend"></div><p class="note">${tip}</p></div>`;
    const lr=el("lenses");Object.entries(LENSES).forEach(([id,l])=>{const b=document.createElement("button");b.className="lens";b.dataset.lens=id;b.textContent=l.name;b.addEventListener("click",e=>{e.stopPropagation();selectLens(id);});lr.appendChild(b);});
    fillLegend();
  } else {
    box.innerHTML=`<div class="card"><p class="kick">Confirmed co-authorship</p><div class="chips"><span class="chip click" data-f="ahn">Ahn &harr; Chattah</span><span class="chip click" data-f="chuan">Chuan &harr; Tsai</span></div>
      <p class="note">Only two co-authorship ties exist among the seventeen, both crossing disciplines. The seams to build on.</p></div>
      <div class="card"><p class="kick">Discipline clusters</p><div class="legend" id="legend"></div></div>`;
    el("sideExtra").querySelectorAll(".chip.click").forEach(c=>c.addEventListener("click",e=>{e.stopPropagation();selectFaculty(c.dataset.f);}));
    fillLegend();
  }
}
function fillLegend(){const lg=el("legend");if(!lg)return;Object.entries(CLUSTERS).forEach(([cid,c])=>{const m=Object.values(FAC).filter(f=>f.cl===cid).map(f=>f.last).join(", ");const row=document.createElement("div");row.className="lg";row.innerHTML=`<span class="sw" style="background:${c.color}"></span><span><b style="color:${c.color};font-weight:600">${cid}</b> ${c.name} · ${m}</span>`;lg.appendChild(row);});}

// tabs
function setTab(v){tab=v;
  el("btn-topics").classList.toggle("on",v==="topics");el("btn-eco").classList.toggle("on",v==="eco");el("btn-scholars").classList.toggle("on",v==="scholars");el("btn-network").classList.toggle("on",v==="network");
  const topics=v==="topics",eco=v==="eco",scholars=v==="scholars",network=v==="network";
  el("bands").classList.toggle("hide",eco||network);
  el("nodes").classList.toggle("hide",eco||network);
  el("ecoTopics").classList.toggle("hide",!eco);
  el("arealbls").classList.toggle("hide",!topics);
  el("clusters").classList.toggle("hide",!(eco||network));
  el("fnodes").classList.toggle("hide",topics);
  el("fedges").classList.toggle("hide",!scholars);
  el("sties").classList.toggle("hide",!scholars);
  el("ecoEdges").classList.toggle("hide",!eco);
  el("net").classList.toggle("hide",!network);
  ctT.classList.toggle("hide",network);ctN.classList.toggle("hide",!network);
  if(!topics)placeFaculty(network?"network":eco?"ecosystem":"scholars");
  el("thesis").innerHTML = topics
    ? "The field organizes around three outcomes: <b>safety</b>, <b>permanency</b>, and <b>wellbeing</b>, plus the <b>system and equity</b> work around them. Seventeen topics in all."
    : eco
    ? "The two-ring ecosystem: topics on the inside, the nine disciplines on the outside, joined by threads. Methodology and big data scholars carry a dashed ring because they reach every topic."
    : scholars
    ? "The same wheel, with your colleagues placed near the topics they study and joined by their <b>interdisciplinary ties</b>: shared topics across different disciplines."
    : "The same people, now sized by Google Scholar citations and joined by what they have published: gold for co-authorship, dashed for shared keywords.";
  el("howto").innerHTML = topics
    ? "<b>Click a topic</b> for what it covers and research angles."
    : eco
    ? "<b>Click a name</b> for the topics they feed, <b>a topic</b> for who converges there, or <b>a lens</b> for a theme."
    : scholars
    ? "<b>Click a name</b> for all their ties, <b>a topic</b> for who works on it, or <b>a lens</b> for a theme."
    : "<b>Click a name</b> for citations, keywords, and co-authors. Toggle the tie types.";
  buildSide();resetTab();
}
el("btn-topics").addEventListener("click",()=>setTab("topics"));
el("btn-eco").addEventListener("click",()=>setTab("eco"));
el("btn-scholars").addEventListener("click",()=>setTab("scholars"));
el("btn-network").addEventListener("click",()=>setTab("network"));
el("map").addEventListener("click",()=>resetTab());
document.body.addEventListener("click",e=>{if(!e.target.closest(".panel")&&!e.target.closest(".stage")&&!e.target.closest("header"))resetTab();});

setTab("topics");
window.addEventListener("load",()=>{if(window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  setTimeout(()=>selectTopic("connection"),400);setTimeout(()=>resetTopics(),2000);});
</script>
</body>
</html>
